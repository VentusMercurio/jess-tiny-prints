<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet"/>

<script id="tailwind-config">
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#4e635a",
        surface: "#fbf9f1",
        "surface-container": "#f0eee6",
        "surface-container-low": "#f5f4ec",
        "surface-container-high": "#eae8e0",
        "on-surface": "#1b1c17",
        "on-surface-variant": "#424845",
        secondary: "#78564e",
        "outline-variant": "#c2c8c4"
      },
      fontFamily: {
        headline: ["Noto Serif"],
        body: ["Manrope"]
      }
    }
  }
}
</script>
</head>

<body class="bg-surface text-on-surface font-body">

<!-- NAV -->
<nav class="fixed top-0 w-full bg-surface/80 backdrop-blur-md z-50">
<div class="flex justify-between items-center px-8 py-6 max-w-screen-2xl mx-auto">
<div class="text-2xl font-headline">Jess' Tiny Prints</div>
</div>
</nav>

<main class="pt-32 pb-24 px-6 md:px-12 max-w-7xl mx-auto">

<header class="mb-16">
<span class="text-xs uppercase tracking-widest text-secondary">Review</span>
<h1 class="font-headline text-5xl">Your Custom Print</h1>
</header>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-16">

<!-- LEFT -->
<div class="lg:col-span-7">

<div id="orderContainer" class="hidden flex flex-col md:flex-row gap-8">

<div class="w-full md:w-48 aspect-square bg-surface-container-high p-6">
<div class="bg-white w-full h-full overflow-hidden">
<img id="previewImage" class="w-full h-full object-cover"/>
</div>
</div>

<div class="flex-1">
<div class="flex justify-between mb-2">
<h3 class="font-headline text-2xl">Custom Tiny Print</h3>
<span id="priceText" class="text-xl text-primary"></span>
</div>

<div class="mt-4">
<span id="sizeText" class="text-xs uppercase tracking-widest text-secondary"></span>
</div>

</div>
</div>

<!-- EMPTY STATE -->
<div id="emptyState" class="text-center text-on-surface-variant">
No order found. Please customize your print first.
</div>

</div>

<!-- RIGHT -->
<div class="lg:col-span-5">
<div class="bg-surface-container-low p-10 sticky top-32">

<h2 class="font-headline text-3xl mb-10">Order Summary</h2>

<div class="space-y-6 mb-10">
<div class="flex justify-between">
<span>Subtotal</span>
<span id="subtotal"></span>
</div>

<div class="flex justify-between">
<span>Shipping</span>
<span>Calculated at checkout</span>
</div>

<div class="flex justify-between">
<span>Tax</span>
<span>$0.00</span>
</div>

<div class="pt-6 border-t border-outline-variant/30 flex justify-between">
<span class="font-headline text-xl">Total</span>
<span id="total" class="font-headline text-xl text-primary"></span>
</div>
</div>

<button id="checkoutBtn"
class="w-full bg-primary text-white py-5 uppercase text-xs tracking-widest">
Pay with Stripe →
</button>

</div>
</div>

</div>

</main>

<script>
// STRIPE LINKS
const STRIPE_2X2 = "YOUR_STRIPE_LINK_2X2"
const STRIPE_3X3 = "YOUR_STRIPE_LINK_3X3"

// LOAD ORDER
const order = JSON.parse(localStorage.getItem("order"))

if(order){
  document.getElementById("orderContainer").classList.remove("hidden")
  document.getElementById("emptyState").classList.add("hidden")

  const price = order.size === "2x2" ? 50 : 75

  document.getElementById("previewImage").src = order.image
  document.getElementById("priceText").innerText = `$${price}`
  document.getElementById("sizeText").innerText = `${order.size} Print`
  document.getElementById("subtotal").innerText = `$${price}`
  document.getElementById("total").innerText = `$${price}`

  document.getElementById("checkoutBtn").onclick = () => {
    window.location.href = order.size === "2x2" ? STRIPE_2X2 : STRIPE_3X3
  }
}
</script>

</body>
</html>
